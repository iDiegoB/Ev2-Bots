<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emisión de Etiquetas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #333;
      padding: 20px;
    }

    nav {
      background: #2c3e50;
      color: white;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    nav strong { font-size: 16px; }
    nav span { font-size: 13px; opacity: 0.7; }

    /* ── Layout principal ── */
    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 16px;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* ── Paneles ── */
    .panel {
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .panel-header {
      background: #f8f9fa;
      border-bottom: 1px solid #eee;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: bold;
      color: #555;
    }
    .panel-body {
      padding: 16px;
    }

    /* ── Formulario ── */
    .campo {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    select, input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 7px;
      font-size: 13px;
      outline: none;
      color: #333;
      background: white;
    }
    select:focus, input:focus { border-color: #3498db; }

    /* Selector de tamaño */
    .tamanos {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .tamano-opcion {
      border: 2px solid #ddd;
      border-radius: 7px;
      padding: 8px 4px;
      text-align: center;
      cursor: pointer;
      font-size: 12px;
      color: #666;
      transition: all 0.15s;
    }
    .tamano-opcion:hover { border-color: #3498db; color: #3498db; }
    .tamano-opcion.activo { border-color: #3498db; background: #ebf5fb; color: #3498db; font-weight: bold; }
    .tamano-opcion .dims { font-size: 14px; font-weight: bold; display: block; }

    /* Botón principal */
    .btn-generar {
      width: 100%;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 7px;
      padding: 10px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 6px;
    }
    .btn-generar:hover { background: #2980b9; }

    .btn-imprimir {
      width: 100%;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 7px;
      padding: 10px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-imprimir:hover { background: #229954; }

    /* ── Vista previa de etiquetas ── */
    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .preview-header span { font-size: 12px; color: #aaa; }

    .etiquetas-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
      min-height: 200px;
    }

    /* ── La etiqueta en sí ── */
    .etiqueta {
      background: white;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .et-header {
      background: #2c3e50;
      color: #f0a500;
      font-size: 9px;
      font-weight: bold;
      padding: 4px 8px;
      letter-spacing: 0.5px;
    }
    .et-body {
      padding: 6px 8px;
    }
    .et-nombre {
      font-size: 8px;
      color: #333;
      font-weight: bold;
      margin-bottom: 2px;
      line-height: 1.3;
    }
    .et-codigo {
      font-size: 13px;
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 4px;
    }
    /* Código de barras decorativo (SVG simple) */
    .et-barras {
      width: 100%;
      height: 24px;
      margin-bottom: 2px;
    }
    .et-barnum {
      font-size: 7px;
      text-align: center;
      color: #888;
      margin-bottom: 4px;
    }
    .et-datos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
    }
    .et-dato {
      background: #f5f5f5;
      padding: 2px 4px;
      border-radius: 2px;
    }
    .et-dato-k { font-size: 6px; color: #aaa; text-transform: uppercase; }
    .et-dato-v { font-size: 8px; font-weight: bold; color: #333; }
    .et-footer {
      background: #f8f9fa;
      border-top: 1px solid #eee;
      padding: 3px 8px;
      font-size: 7px;
      color: #bbb;
      text-align: right;
    }

    /* Mensaje cuando no hay etiquetas */
    .empty-msg {
      grid-column: 1/-1;
      text-align: center;
      color: #ccc;
      font-size: 13px;
      padding: 40px 0;
    }

    .scrum-tag {
      position: fixed;
      top: 12px;
      right: 16px;
      background: #3498db;
      color: white;
      font-size: 11px;
      font-weight: bold;
      padding: 4px 10px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

<nav>
  <strong>📦 Sistema de Inventario</strong>
  <span>Inventario &rsaquo; Emisión de Etiquetas</span>
</nav>

<div class="layout">

  <!-- Panel de configuración -->
  <div class="panel">
    <div class="panel-header">⚙️ Configurar Etiqueta</div>
    <div class="panel-body">

      <div class="campo">
        <label>Producto</label>
        <select id="selectProducto">
          <option value="PROD-001|Sensor HC-SR04|Electrónica">PROD-001 — Sensor HC-SR04</option>
          <option value="PROD-002|Arduino UNO R3|Electrónica">PROD-002 — Arduino UNO R3</option>
          <option value="PROD-003|LCD 16x2 I2C|Displays">PROD-003 — LCD 16x2 I2C</option>
          <option value="PROD-005|Raspberry Pi 4|Computación">PROD-005 — Raspberry Pi 4</option>
          <option value="PROD-010|Protoboard 830p|Herramientas">PROD-010 — Protoboard 830p</option>
        </select>
      </div>

      <div class="campo">
        <label>Bodega</label>
        <select id="selectBodega">
          <option>Bodega Norte (BOD-001)</option>
          <option>Bodega Sur (BOD-002)</option>
          <option>Bodega Central (BOD-003)</option>
        </select>
      </div>

      <div class="campo">
        <label>Tamaño de etiqueta</label>
        <div class="tamanos">
          <div class="tamano-opcion activo" onclick="selecTamano(this)">
            <span class="dims">50×30</span>
            Pequeña
          </div>
          <div class="tamano-opcion" onclick="selecTamano(this)">
            <span class="dims">70×40</span>
            Mediana
          </div>
          <div class="tamano-opcion" onclick="selecTamano(this)">
            <span class="dims">100×50</span>
            Grande
          </div>
        </div>
      </div>

      <div class="campo">
        <label>Cantidad de etiquetas</label>
        <input type="number" id="cantidad" value="6" min="1" max="30"/>
      </div>

      <button class="btn-generar" onclick="generarEtiquetas()">🏷️ Generar Vista Previa</button>
      <button class="btn-imprimir" onclick="imprimirEtiquetas()">🖨️ Imprimir Etiquetas</button>

    </div>
  </div>

  <!-- Panel de vista previa -->
  <div class="panel">
    <div class="panel-header">
      <div class="preview-header">
        <span>📄 Vista Previa</span>
        <span id="contadorLabel">0 etiquetas generadas</span>
      </div>
    </div>
    <div class="panel-body">
      <div class="etiquetas-grid" id="gridEtiquetas">
        <div class="empty-msg">
          Configura los datos y presiona<br/>"Generar Vista Previa"
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  function selecTamano(el) {
    document.querySelectorAll('.tamano-opcion').forEach(o => o.classList.remove('activo'));
    el.classList.add('activo');
  }

  // Dibuja un código de barras decorativo con SVG
  function barrasSVG(codigo) {
    // Usa el codigo para "generar" un patrón determinista
    let x = 0;
    let rects = '';
    for (let i = 0; i < codigo.length * 3; i++) {
      const charCode = codigo.charCodeAt(i % codigo.length);
      const ancho = (charCode * (i + 1)) % 3 + 1;
      rects += `<rect x="${x}" y="0" width="${ancho}" height="24" fill="#333"/>`;
      x += ancho + ((charCode + i) % 3) + 1;
    }
    return `<svg class="et-barras" viewBox="0 0 ${x} 24" preserveAspectRatio="none">${rects}</svg>`;
  }

  function generarEtiquetas() {
    const selProd = document.getElementById('selectProducto');
    const partes  = selProd.value.split('|');
    const codigo  = partes[0];
    const nombre  = partes[1];
    const cat     = partes[2];
    const bodega  = document.getElementById('selectBodega').value;
    const cantidad = parseInt(document.getElementById('cantidad').value);
    const fecha   = new Date().toLocaleDateString('es-CL');

    const grid = document.getElementById('gridEtiquetas');
    grid.innerHTML = '';

    for (let i = 0; i < cantidad; i++) {
      const etDiv = document.createElement('div');
      etDiv.className = 'etiqueta';
      etDiv.innerHTML = `
        <div class="et-header">InventSys &nbsp;·&nbsp; ${cat}</div>
        <div class="et-body">
          <div class="et-nombre">${nombre}</div>
          <div class="et-codigo">${codigo}</div>
          ${barrasSVG(codigo + i)}
          <div class="et-barnum">${codigo.replace('-','')}-${1000 + i}</div>
          <div class="et-datos">
            <div class="et-dato">
              <div class="et-dato-k">Bodega</div>
              <div class="et-dato-v">${bodega.split(' ')[1] || 'BOD'}</div>
            </div>
            <div class="et-dato">
              <div class="et-dato-k">Fecha</div>
              <div class="et-dato-v">${fecha}</div>
            </div>
          </div>
        </div>
        <div class="et-footer">InventSys v1.0</div>
      `;
      grid.appendChild(etDiv);
    }

    document.getElementById('contadorLabel').textContent = cantidad + ' etiqueta' + (cantidad !== 1 ? 's' : '') + ' generada' + (cantidad !== 1 ? 's' : '');
  }

  function imprimirEtiquetas() {
    const grid = document.getElementById('gridEtiquetas');
    if (!grid.querySelector('.etiqueta')) {
      alert('Primero genera las etiquetas.');
      return;
    }
    window.print();
  }
</script>

</body>
</html>
